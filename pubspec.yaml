publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.10.0 <4.0.0"
  flutter: ">=3.41.6"

dependencies:
  connectivity_plus: ^6.1.0
  cupertino_icons: ^1.0.8
  device_info_plus: ^11.1.1
  flutter:
    sdk: flutter
  flutter_markdown: ^0.7.5
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  logging: ^1.3.0
  package_info_plus: ^8.1.1
  rxdart: ^0.28.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/loading.png
