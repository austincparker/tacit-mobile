name: Staging Deployments

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check_deploy:
    uses: ./.github/workflows/_check_deploy.yml
    secrets: inherit

  test:
    uses: ./.github/workflows/test.yml

  increment_build_number:
    uses: ./.github/workflows/_increment_build_number.yml
    needs: [test, check_deploy]
    if: needs.check_deploy.outputs.ios == 'true' || needs.check_deploy.outputs.android == 'true'
    secrets: inherit

  staging_ios:
    uses: ./.github/workflows/ios.yml
    needs:
      - test
      - check_deploy
      - increment_build_number
    if: always() && needs.test.result == 'success' && needs.check_deploy.outputs.ios == 'true' && needs.increment_build_number.result != 'failure'
    secrets: inherit
    with:
      pilot_apple_id: ${{ vars.PILOT_APPLE_ID }}
      flavor: staging

  staging_android_firebase:
    uses: ./.github/workflows/android.yml
    needs:
      - test
      - check_deploy
      - increment_build_number
    if: always() && needs.test.result == 'success' && needs.check_deploy.outputs.android == 'true' && needs.increment_build_number.result != 'failure'
    secrets: inherit
    with:
      flavor: staging
      platform: android_firebase
      supply_package_name: dev.twinsun.flutter_app_base.staging
