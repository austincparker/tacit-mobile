name: Accessibility Check

on:
  workflow_call:

jobs:
  wcag_compliance:
    name: "WCAG 2.2 Compliance"
    runs-on: [runs-on, runner=2cpu-linux-x64, "run-id=${{ github.run_id }}"]
    container:
      image: twinsunllc/flutter
      # Root required: FVM needs write access to SDK directories for version symlinks
      options: --user root

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: "Run Anti-Pattern Detection (Required)"
        run: bash bin/accessibility_check lib/

      - name: Set Flutter Version
        uses: ./.github/workflows/set_flutter_version

      - name: Install Dependencies
        run: fvm flutter pub get

      - name: "Run Level A Tests (Required)"
        run: fvm flutter test --tags accessibility --name "\[Level-A\]" test/accessibility/

      - name: "Run Level AA Tests (Informational)"
        if: success() || failure()
        continue-on-error: true
        run: fvm flutter test --tags accessibility --name "\[Level-AA\]" test/accessibility/
