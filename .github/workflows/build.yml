# Standalone PR workflow — runs independently from test.yml.
# Both trigger on pull_request but verify different things:
# test.yml: unit tests, analysis, security, accessibility
# build.yml: platform compilation (catches broken imports, build config issues)
name: Build Verification

on:
  workflow_dispatch:
  workflow_call:
  pull_request:

env:
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"

jobs:
  android:
    name: Android Debug Build
    runs-on: [runs-on, runner=4cpu-linux-x64, "run-id=${{ github.run_id }}"]
    container:
      image: twinsunllc/android-flutter-jdk17
      options: --user root
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set Flutter Version
        uses: ./.github/workflows/set_flutter_version

      - name: Install Dependencies
        run: fvm flutter pub get

      - name: Build Android APK (debug, no signing)
        # Builds staging flavor for PR verification (configured via flavorizr.yaml)
        run: fvm flutter build apk --debug --flavor staging

  ios:
    name: iOS Debug Build
    # Cannot use the shared set_flutter_version composite action here because
    # it assumes a Linux container with pre-installed Flutter SDK paths.
    # macOS runners need FVM installed from scratch.
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Dart
        uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1

      - name: Install FVM
        run: dart pub global activate fvm

      - name: Add FVM to PATH
        run: echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Install Flutter Version
        run: |
          FLUTTER_VERSION=$(sed -n 's/.*"flutter": *"\([^"]*\)".*/\1/p' .fvmrc)
          fvm install "$FLUTTER_VERSION"
          fvm use "$FLUTTER_VERSION" --skip-pub-get

      - name: Enable Swift Package Manager
        run: fvm flutter config --enable-swift-package-manager

      - name: Install Dependencies
        run: fvm flutter pub get

      - name: Build iOS (debug, no codesign)
        # Builds staging flavor for PR verification (configured via flavorizr.yaml)
        run: fvm flutter build ios --debug --no-codesign --flavor staging
