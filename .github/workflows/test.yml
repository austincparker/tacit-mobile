name: Tests

on:
  workflow_dispatch:
  workflow_call:
  pull_request:

env:
  LC_ALL: "en_US.UTF-8"
  LANG: "en_US.UTF-8"
  ENVIRONMENT: test

jobs:
  test:
    runs-on: [runs-on, runner=2cpu-linux-x64, "run-id=${{ github.run_id }}"]
    container:
      image: twinsunllc/flutter
      # Root required: FVM needs write access to SDK directories for version symlinks
      options: --user root
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set Flutter Version
        uses: ./.github/workflows/set_flutter_version

      - name: Install Dependencies
        run: fvm flutter pub get

      - name: Run Tests
        run: fvm flutter test

  analyze:
    runs-on: [runs-on, runner=2cpu-linux-x64, "run-id=${{ github.run_id }}"]
    container:
      image: twinsunllc/flutter
      options: --user root
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set Flutter Version
        uses: ./.github/workflows/set_flutter_version

      - name: Install Dependencies
        run: fvm flutter pub get

      - name: Run Static Analysis
        run: fvm flutter analyze

  security:
    uses: ./.github/workflows/_security.yml

  accessibility:
    uses: ./.github/workflows/_accessibility.yml
