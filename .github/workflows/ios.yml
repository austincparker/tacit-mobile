# ┌──────────────────────────────────────────────────────────────────┐
# │ iOS Deploy Setup                                                │
# │                                                                 │
# │ This workflow requires the following GitHub variables:           │
# │   PILOT_USERNAME            - Apple ID email                    │
# │   PILOT_TEAM_ID             - App Store Connect team ID         │
# │   PILOT_DEV_PORTAL_TEAM_ID  - Developer Portal team ID         │
# │                                                                 │
# │ And the following GitHub secrets:                                │
# │   FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD                  │
# │   KEYCHAIN_PASSWORD                                             │
# │   MATCH_GIT_BASIC_AUTHORIZATION                                 │
# │   MATCH_PASSWORD                                                │
# │                                                                 │
# │ Run setup.dart for copy-paste gh CLI commands to configure these.│
# └──────────────────────────────────────────────────────────────────┘

name: iOS Builds

on:
  workflow_call:
    inputs:
      pilot_apple_id:
        description: "Apple ID for the app"
        required: true
        type: string
      flavor:
        description: "Flavor to use"
        required: true
        type: string

jobs:
  build:
    runs-on: [self-hosted, macos]
    timeout-minutes: 30

    env:
      LC_ALL: en_US.UTF-8
      LANG: en_US.UTF-8
      PILOT_USERNAME: ${{ vars.PILOT_USERNAME }}
      PILOT_APP_IDENTIFIER: dev.twinsun.flutter-app-base
      PILOT_TEAM_ID: ${{ vars.PILOT_TEAM_ID }}
      PILOT_DEV_PORTAL_TEAM_ID: ${{ vars.PILOT_DEV_PORTAL_TEAM_ID }}

      # Inputs
      PILOT_APPLE_ID: ${{ inputs.pilot_apple_id }}
      FLAVOR: ${{ inputs.flavor }}

      # Secrets
      FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD: ${{ secrets.FASTLANE_APPLE_APPLICATION_SPECIFIC_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Dart
        uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c # v1

      - name: Find Build Number
        uses: ./.github/workflows/find_build_number
        id: find_build_number

      - name: Set Flutter Version
        uses: ./.github/workflows/set_flutter_version

      - name: Initialize Flutter Project
        run: |
          fvm flutter config --enable-swift-package-manager
          fvm flutter pub get
          fvm flutter clean

      - name: Deploy iOS Build
        run: bin/deploy ios $FLAVOR "${{ steps.find_build_number.outputs.build_number }}" "$BUILD_NAME_OVERRIDE"
